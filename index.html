<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦幻摩天轮留言板</title>
    <style>
        :root {
            --rotate-speed: 30s; /* 旋转速度，越小越快 */
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* 重要：替换为你下载的图片文件名 */
            background: url('./bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 黑色遮罩，让背景图稍微暗一点，突显文字 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 0;
        }

        /* 摩天轮旋转容器 */
        #wheel-container {
            position: relative;
            width: 600px;
            height: 600px;
            z-index: 1;
            animation: wheel-rotate var(--rotate-speed) linear infinite;
        }

        /* 留言气泡样式 */
        .message-bubble {
            position: absolute;
            width: 100px;
            min-height: 60px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px); /* 毛玻璃效果 */
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 反向旋转，保持文字水平 */
            animation: counter-rotate var(--rotate-speed) linear infinite;
        }

        .bubble-user {
            font-size: 12px;
            font-weight: bold;
            color: #ffdae9;
            text-shadow: 0 0 5px rgba(255, 105, 180, 0.8);
            margin-bottom: 4px;
        }

        .bubble-content {
            font-size: 11px;
            color: #ffffff;
            margin: 0;
            text-align: center;
            word-break: break-all;
        }

        @keyframes wheel-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes counter-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        /* 输入框区域（放在底部） */
        .input-area {
            position: fixed;
            bottom: 30px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        input {
            background: rgba(255,255,255,0.8);
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            outline: none;
        }

        button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #ff1493; }
    </style>
</head>
<body>

    <div id="wheel-container">
        </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="你的名字">
        <input type="text" id="msgInput" placeholder="写下浪漫留言...">
        <button onclick="sendMsg()">发射</button>
    </div>

    <script>
        const API_URL = "https://jubensha.onrender.com/api/messages";
        const RADIUS = 260; // 调整这个数值，让气泡刚好落在图片吊篮位置

        async function loadMessages() {
            try {
                const res = await fetch(API_URL);
                const messages = await res.json();
                renderWheel(messages);
            } catch (err) {
                console.error("加载失败", err);
            }
        }

        function renderWheel(messages) {
            const container = document.getElementById('wheel-container');
            container.innerHTML = '';

            const count = messages.length;
            const centerX = 300;
            const centerY = 300;

            messages.forEach((msg, i) => {
                const angle = (i / count) * 2 * Math.PI;
                const x = centerX + RADIUS * Math.cos(angle) - 50; // 50是气泡宽的一半
                const y = centerY + RADIUS * Math.sin(angle) - 30; // 30是气泡高的一半

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.style.left = `${x}px`;
                bubble.style.top = `${y}px`;

                bubble.innerHTML = `
                    <div class="bubble-user">${msg.user || '匿名者'}</div>
                    <p class="bubble-content">${msg.content}</p>
                `;
                container.appendChild(bubble);
            });
        }

        async function sendMsg() {
            const user = document.getElementById('userInput').value;
            const content = document.getElementById('msgInput').value;
            if(!content) return alert("写点什么吧");

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, content })
            });

            document.getElementById('msgInput').value = '';
            loadMessages(); // 刷新
        }

        // 初始加载
        loadMessages();
        // 每10秒自动刷新一次，同步别人的留言
        setInterval(loadMessages, 10000);
    </script>
</body>
</html>
