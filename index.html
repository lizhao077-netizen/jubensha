<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>摩天轮双人对话</title>
    <style>
        :root { --main-color: #ff7675; --bg: #1a1a2e; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: sans-serif; }
        
        /* 旋转摩天轮背景 */
        .wheel-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vw; opacity: 0.3; z-index: 1;
            background: url('https://img.icons8.com/color/480/ferris-wheel.png') no-repeat center/contain;
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 聊天容器 */
        .chat-container { position: fixed; bottom: 20px; left: 5%; width: 90%; z-index: 10; transition: 0.3s; }
        .chat-container.collapsed { transform: translateY(calc(100% - 50px)); }
        
        .chat-box { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px); border-radius: 20px; height: 65vh; display: flex; flex-direction: column;
        }

        .chat-header { padding: 15px; color: white; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        
        .user-toggle { display: flex; justify-content: center; gap: 20px; padding: 10px; background: rgba(0,0,0,0.2); }
        .avatar-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid transparent; overflow: hidden; }
        .avatar-btn.active { border-color: var(--main-color); transform: scale(1.1); }
        .avatar-btn img { width: 100%; height: 100%; object-fit: cover; }

        .msg-list { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; color: white; display: flex; gap: 8px; font-size: 14px; }
        .msg.A { align-self: flex-start; background: rgba(255,255,255,0.2); }
        .msg.B { align-self: flex-end; flex-direction: row-reverse; background: var(--main-color); }
        .msg img { width: 30px; height: 30px; border-radius: 50%; }

        .input-area { padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; border-radius: 20px; border: none; padding: 8px 15px; outline: none; }
        button { background: var(--main-color); color: white; border: none; border-radius: 20px; padding: 0 15px; }
    </style>
</head>
<body>
    <div class="wheel-bg"></div>
    <div class="chat-container" id="container">
        <div class="chat-box">
            <div class="chat-header" onclick="document.getElementById('container').classList.toggle('collapsed')">🎡 摩天轮留言板 (点击收缩)</div>
            <div class="user-toggle">
                <div class="avatar-btn active" id="btnA" onclick="setUser('A')">
                    < img src="https://api.dicebear.com/7.x/adventurer/svg?seed=A" id="imgA">
                    <input type="file" id="fileA" hidden onchange="upload(event, 'A')">
                </div>
                <div class="avatar-btn" id="btnB" onclick="setUser('B')">
                    < img src="https://api.dicebear.com/7.x/adventurer/svg?seed=B" id="imgB">
                    <input type="file" id="fileB" hidden onchange="upload(event, 'B')">
                </div>
            </div>
            <div class="msg-list" id="list"></div>
            <div class="input-area">
                <input type="text" id="input" placeholder="写下留言...">
                <button onclick="send()">发送</button>
            </div>
        </div>
    </div>

    <script>
        // --- 请修改这里 ---
        const SERVER_IP = "192.168.1.100"; // 换成你电脑运行 Python 时的局域网 IP
        const API = `http://${SERVER_IP}:5000/api/messages`;
        
        let currentUser = 'A';
        const avatars = { A: document.getElementById('imgA').src, B: document.getElementById('imgB').src };

        function setUser(u) {
            currentUser = u;
            document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn${u}`).classList.add('active');
        }

        // 长按头像上传本地图片
        document.querySelectorAll('.avatar-btn').forEach(btn => {
            btn.oncontextmenu = (e) => { e.preventDefault(); btn.querySelector('input').click(); };
        });

        function upload(e, u) {
            const reader = new FileReader();
            reader.onload = () => { avatars[u] = reader.result; document.getElementById(`img${u}`).src = reader.result; };
            reader.readAsDataURL(e.target.files[0]);
        }

        async function send() {
            const input = document.getElementById('input');
            if(!input.value.trim()) return;

            const msgData = { user: currentUser, content: input.value, avatar: avatars[currentUser] };
            await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(msgData) });
            input.value = '';
            load();
        }

        async function load() {
            const res = await fetch(API);
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = data.map(m => `
                <div class="msg ${m.user}">
                    < img src="${m.avatar}">
                    <div>${m.content}</div>
                </div>
            `).join('');
            list.scrollTop = list.scrollHeight;
        }

        setInterval(load, 3000); // 每3秒自动刷新一次
        window.onload = load;
    </script>
</body>
</html>
