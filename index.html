<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩色旋转摩天轮留言板</title>
    <style>
        /* 基础样式 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'PingFang SC', sans-serif;
            background: #1a1a2e; /* 深蓝色背景，衬托彩色摩天轮 */
            overflow: hidden;
        }

        /* 摩天轮旋转容器 */
        .ferris-wheel-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            z-index: -1;
            opacity: 0.6; /* 适当透明，不干扰留言板 */
        }

        /* 摩天轮主体：彩色图片旋转 */
        .ferris-wheel {
            width: 100%;
            height: 100%;
            background-image: url('https://img.icons8.com/color/480/ferris-wheel.png'); /* 彩色摩天轮图标 */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            /* 关键动画：无限旋转 */
            animation: rotateWheel 20s linear infinite;
        }

        /* 旋转动画定义 */
        @keyframes rotateWheel {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 留言板 UI */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .chat-box {
            width: 100%;
            max-width: 380px;
            height: 70vh;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            backdrop-filter: blur(15px); /* 毛玻璃效果 */
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .chat-header {
            padding: 15px;
            text-align: center;
            color: #fff;
            font-size: 1.1rem;
            letter-spacing: 2px;
